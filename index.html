<!DOCTYPE html>
<html lang="bn">
<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আল-হাদিস ও কুরআন</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #00796B;
            --header-bg: linear-gradient(135deg, #004D40, #00796B);
            --bismillah-color: #004D40;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #14b8a6;
            --header-bg: linear-gradient(135deg, #111827, #1f2937);
            --bismillah-color: #14b8a6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: all 0.3s ease; padding-bottom: 60px; }
        .header { background: var(--header-bg); color: white; text-align: center; padding: 30px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.8; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .card { background: var(--card-bg); padding: 20px 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card-icon { font-size: 35px; margin-bottom: 10px; display: block; }
        .card h3 { font-size: 16px; font-weight: 600; }
        
        .view-section { display: none; margin-top: 10px; }
        .back-btn { background: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        
        /* Surah List Styling */
        .list-item { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: rgba(0, 121, 107, 0.05); }
        .surah-info { display: flex; align-items: center; gap: 15px; }
        .surah-num { background: var(--primary-color); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; font-weight: bold; }
        .arabic-text { font-family: 'Amiri', serif; font-size: 20px; color: var(--primary-color); }
        
        /* Ayat Detail Styling */
        .bismillah { font-family: 'Amiri', serif; font-size: 28px; text-align: center; color: var(--bismillah-color); margin: 20px 0; }
        .ayah-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ayah-arabic { font-family: 'Amiri', serif; font-size: 26px; text-align: right; direction: rtl; line-height: 1.8; color: var(--text-color); margin-bottom: 12px; }
        .ayah-bangla { font-size: 15px; line-height: 1.6; color: var(--text-color); opacity: 0.9; text-align: left; }
        .ayah-number { font-size: 12px; font-weight: bold; color: var(--primary-color); margin-bottom: 8px; display: inline-block; background: rgba(0, 121, 107, 0.1); padding: 2px 8px; border-radius: 10px; }
        
        .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: #00796B; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="header-title">আল-হাদিস ও কুরআন</h1>
        <p id="header-subtitle">আধুনিক ইসলামিক লাইব্রেরি সংস্করণ</p>
    </div>

    <div class="container">
        <div id="dashboard-view">
            <div class="grid">
                <div class="card" onclick="openQuran()">
                    <span class="card-icon">📖</span>
                    <h3>কুরআন ও তাফসীর</h3>
                </div>
                <div class="card" onclick="alert('হাদিস সেকশনটি পরবর্তী ধাপে যুক্ত করা হবে।')">
                    <span class="card-icon">🕌</span>
                    <h3>হাদিসসমূহ</h3>
                </div>
                <div class="card" onclick="alert('ইসলামিক গ্রন্থ সেকশনটি শীঘ্রই আসছে।')">
                    <span class="card-icon">📚</span>
                    <h3>ইসলামিক গ্রন্থ</h3>
                </div>
                <div class="card" onclick="alert('বুকমার্কস সেকশনটি শীঘ্রই আসছে।')">
                    <span class="card-icon">🔖</span>
                    <h3>বুকমার্কস</h3>
                </div>
            </div>
        </div>

        <div id="quran-view" class="view-section">
            <button class="back-btn" onclick="showDashboard()">← ড্যাশবোর্ডে ফিরুন</button>
            <div id="surah-list">⏳ সূরা তালিকা লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        </div>

        <div id="surah-detail-view" class="view-section">
            <button class="back-btn" onclick="backToSurahList()">← সূরা তালিকায় ফিরুন</button>
            <div id="surah-detail-content">⏳ আয়াত লোড হচ্ছে...</div>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW error", err));
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
            }
        }

        function openQuran() {
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('surah-detail-view').style.display = 'none';
            document.getElementById('quran-view').style.display = 'block';
            document.getElementById('header-title').textContent = 'পবিত্র কুরআন';
            document.getElementById('header-subtitle').textContent = '১১৪ টি সূরার তালিকা';
            loadSurahList();
        }

        function showDashboard() {
            document.getElementById('quran-view').style.display = 'none';
            document.getElementById('surah-detail-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            document.getElementById('header-title').textContent = 'আল-হাদিস ও কুরআন';
            document.getElementById('header-subtitle').textContent = 'আধুনিক ইসলামিক লাইব্রেরি সংস্করণ';
        }

        function backToSurahList() {
            document.getElementById('surah-detail-view').style.display = 'none';
            document.getElementById('quran-view').style.display = 'block';
            document.getElementById('header-title').textContent = 'পবিত্র কুরআন';
            document.getElementById('header-subtitle').textContent = '১১৪ টি সূরার তালিকা';
        }

        async function loadSurahList() {
            const listContainer = document.getElementById('surah-list');
            if (listContainer.innerHTML !== '' && !listContainer.innerHTML.includes('লোডিং') && !listContainer.innerHTML.includes('এপিআই')) {
                return; // যদি অলরেডি ডাটা লোড থাকে তবে পুনরায় এপিআই কল করবে না
            }
            
            listContainer.innerHTML = '⏳ এপিআই থেকে সূরা লোড করা হচ্ছে...';
            
            try {
                const response = await fetch('https://api.quran.com/api/v4/chapters');
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                listContainer.innerHTML = ''; 
                
                data.chapters.forEach(surah => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.onclick = () => openSurahDetail(surah.id, surah.name_simple, surah.name_arabic);
                    item.innerHTML = `
                        <div class="surah-info">
                            <div class="surah-num">${surah.id}</div>
                            <div>
                                <strong>${surah.name_simple}</strong>
                                <p style="font-size: 12px; opacity: 0.7;">আয়াত: ${surah.verses_count} | অবতীর্ণ: ${surah.revelation_place === 'makkah' ? 'মাক্কী' : 'মাদানী'}</p>
                            </div>
                        </div>
                        <div class="arabic-text">${surah.name_arabic}</div>
                    `;
                    listContainer.appendChild(item);
                });
            } catch (error) {
                console.error(error);
                listContainer.innerHTML = '❌ সূরা তালিকা লোড করা যায়নি। ইন্টারনেট কানেকশন চেক করুন।';
            }
        }

        async function openSurahDetail(surahId, surahNameBangla, surahNameArabic) {
            // স্ক্রিন পরিবর্তন
            document.getElementById('quran-view').style.display = 'none';
            document.getElementById('surah-detail-view').style.display = 'block';
            
            // হেডার পরিবর্তন
            document.getElementById('header-title').textContent = surahNameBangla;
            document.getElementById('header-subtitle').textContent = surahNameArabic;
            
            const detailContainer = document.getElementById('surah-detail-content');
            detailContainer.innerHTML = '⏳ সূরার আয়াত ও বাংলা অনুবাদ লোড হচ্ছে, অপেক্ষা করুন...';
            
            try {
                // ১. আরবি আয়াতের ডাটা আনা (উসমানী ফন্ট)
                const arabicResponse = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${surahId}`);
                // ২. বাংলা অনুবাদের ডাটা আনা (অনুবাদক আইডি ১৬৩ = বায়ান ফাউন্ডেশন)
                const banglaResponse = await fetch(`https://api.quran.com/api/v4/quran/translations/163?chapter_number=${surahId}`);
                
                if (!arabicResponse.ok || !banglaResponse.ok) throw new Error('Failed to fetch verses');
                
                const arabicData = await arabicResponse.json();
                const banglaData = await banglaResponse.json();
                
                detailContainer.innerHTML = '';
                
                // সূরা তওবা (Surah No 9) ছাড়া সব সূরার শুরুতে বিসমিল্লাহ প্রদর্শন করবে
                if (surahId !== 9) {
                    const bismillahDiv = document.createElement('div');
                    bismillahDiv.className = 'bismillah';
                    bismillahDiv.textContent = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
                    detailContainer.appendChild(bismillahDiv);
                }
                
                // আয়াত ও অনুবাদ লুপের মাধ্যমে ম্যাপ করা
                const verses = arabicData.verses;
                const translations = banglaData.translations;
                
                for (let i = 0; i < verses.length; i++) {
                    let arabicText = verses[i].text_uthmani;
                    
                    // প্রথম আয়াতের শুরুতে যদি বিসমিল্লাহ যুক্ত থাকে (ফাতিহা ছাড়া অন্য সূরাতে), তবে তা দেখতে সুন্দর করার জন্য ট্রিম করা যেতে পারে
                    // তবে এপিআই এর উসমানী টেক্সট সাধারণত স্ট্যান্ডার্ডই থাকে।
                    if (surahId !== 1 && surahId !== 9 && i === 0) {
                        // কিছু এপিআই রেসপন্সে প্রথম আয়াতে বিসমিল্লাহ টেক্সট বিল্ট-ইন থাকে, তা সরানোর জন্য এই কোড (ঐচ্ছিক)
                        arabicText = arabicText.replace('بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ', '').trim();
                        arabicText = arabicText.replace('بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ', '').trim();
                    }

                    const ayahCard = document.createElement('div');
                    ayahCard.className = 'ayah-card';
                    ayahCard.innerHTML = `
                        <span class="ayah-number">আয়াত: ${i + 1}</span>
                        <div class="ayah-arabic">${arabicText}</div>
                        <div class="ayah-bangla">${translations[i].text}</div>
                    `;
                    detailContainer.appendChild(ayahCard);
                }
                
                // পড়া শুরু করার পর স্ক্রিন একদম উপরে স্ক্রোল করা
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                detailContainer.innerHTML = '❌ আয়াত এবং অনুবাদ লোড করতে সমস্যা হয়েছে। দয়া করে আবার চেষ্টা করুন।';
            }
        }
    </script>
</body>
</html>
