<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quran & Hadith BD</title>

<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5;}
.header{background:#00695c;color:#fff;padding:20px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px;cursor:pointer}
.hidden{display:none}
.btn{padding:8px 12px;background:#00695c;color:#fff;border:none;border-radius:6px}
.item{background:#fff;margin:8px 0;padding:10px;border-radius:8px}
.ar{font-size:22px;text-align:right}
.bn{font-size:14px;color:#444}
.search{width:100%;padding:10px;margin:10px 0}
</style>

</head>
<body>

<div class="header">
<h2>আল কুরআন ও হাদিস</h2>
</div>

<div class="container">

<!-- HOME -->
<div id="home">
  <div class="card" onclick="openQuran()">📖 কুরআন</div>
  <div class="card" onclick="openHadith('bukhari')">🕌 সহিহ বুখারি</div>
  <div class="card" onclick="openHadith('muslim')">🕌 সহিহ মুসলিম</div>
</div>

<!-- QURAN -->
<div id="quran" class="hidden">
<button class="btn" onclick="backHome()">⬅ Back</button>
<input class="search" oninput="searchSurah(this.value)" placeholder="সূরা খুঁজুন...">
<div id="surahList"></div>
</div>

<!-- SURAH DETAIL -->
<div id="surah" class="hidden">
<button class="btn" onclick="openQuran()">⬅ Back</button>
<h3 id="surahTitle"></h3>
<div id="ayahs"></div>
</div>

<!-- HADITH -->
<div id="hadith" class="hidden">
<button class="btn" onclick="backHome()">⬅ Back</button>
<h3 id="hadithTitle"></h3>
<input class="search" oninput="searchHadith(this.value)" placeholder="হাদিস খুঁজুন...">
<div id="hadithList"></div>
</div>

</div>

<script>

// ---------------- QURAN ----------------
let surahCache=[];

async function openQuran(){
home.style.display="none";
quran.style.display="block";
surah.style.display="none";
hadith.style.display="none";

if(surahCache.length===0){
const res=await fetch("https://api.alquran.cloud/v1/surah");
const data=await res.json();
surahCache=data.data;
}
renderSurah(surahCache);
}

function renderSurah(list){
surahList.innerHTML="";
list.forEach(s=>{
surahList.innerHTML+=`
<div class="item" onclick="openSurah(${s.number},'${s.englishName}')">
<b>${s.number}. ${s.englishName}</b><br>
${s.name}
</div>`;
});
}

async function openSurah(id,name){
quran.style.display="none";
surah.style.display="block";
surahTitle.innerText=name;

const res=await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,bn.bengali`);
const data=await res.json();

const ar=data.data[0].ayahs;
const bn=data.data[1].ayahs;

ayahs.innerHTML="";

ar.forEach((a,i)=>{
ayahs.innerHTML+=`
<div class="item">
<div class="ar">${a.text}</div>
<div class="bn">${bn[i].text}</div>
</div>`;
});
}

function searchSurah(v){
renderSurah(surahCache.filter(s=>s.englishName.toLowerCase().includes(v.toLowerCase())));
}

// ---------------- HADITH ----------------

// SAMPLE DATA (structure only)
const HADITH_DB={
bukhari:[
{title:"ঈমান অধ্যায়",text:"নবী (সা.) বলেছেন: ঈমান হলো..." },
{title:"নামাজ",text:"নামাজ ইসলামের স্তম্ভ..." }
],
muslim:[
{title:"পরিচ্ছন্নতা",text:"পরিষ্কার পরিচ্ছন্নতা ঈমানের অংশ..." },
{title:"রোজা",text:"রোজা আল্লাহর জন্য..." }
]
};

let currentHadith=[];

function openHadith(type){
home.style.display="none";
quran.style.display="none";
surah.style.display="none";
hadith.style.display="block";

hadithTitle.innerText= type==="bukhari"?"সহিহ বুখারি":"সহিহ মুসলিম";
currentHadith=HADITH_DB[type];

renderHadith(currentHadith);
}

function renderHadith(list){
hadithList.innerHTML="";
list.forEach(h=>{
hadithList.innerHTML+=`
<div class="item">
<b>${h.title}</b><br>
${h.text}
</div>`;
});
}

function searchHadith(v){
renderHadith(currentHadith.filter(h=>h.title.includes(v)));
}

// ---------------- NAV ----------------
function backHome(){
home.style.display="block";
quran.style.display="none";
hadith.style.display="none";
surah.style.display="none";
}

</script>

</body>
</html>
